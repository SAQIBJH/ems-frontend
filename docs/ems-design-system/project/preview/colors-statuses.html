<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Status colors</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); margin: 0; }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>
<div style="display:flex;flex-wrap:wrap;gap:10px;padding:6px;">
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-active) 14%, transparent);color:var(--status-active);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Active
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-onleave) 14%, transparent);color:var(--status-onleave);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>On leave
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-terminated) 14%, transparent);color:var(--status-terminated);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Terminated
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-approved) 14%, transparent);color:var(--status-approved);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Approved
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-pending) 14%, transparent);color:var(--status-pending);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Pending
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-rejected) 14%, transparent);color:var(--status-rejected);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Rejected
    </span>
  
    <span style="display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab, var(--status-withdrawn) 14%, transparent);color:var(--status-withdrawn);font:500 13px/18px var(--font-sans);padding:5px 12px;border-radius:9999px;">
      <span style="width:7px;height:7px;border-radius:9999px;background:currentColor;"></span>Withdrawn
    </span>
  
</div>
<div style="margin-top:18px;font:400 12px/16px var(--font-sans);color:var(--text-tertiary);font-style:italic;">
  Same status pill anywhere it appears — in tables, profile bands, approval queues, audit logs.
</div>
</body>
</html>
