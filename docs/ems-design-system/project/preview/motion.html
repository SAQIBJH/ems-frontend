<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:14px;">
      <div style="font:600 13px/18px var(--font-sans);color:var(--text-primary);">dur-fast</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--brand-500);margin-top:2px;">120ms</div>
      <div style="font:400 12px/16px var(--font-sans);color:var(--text-tertiary);margin-top:6px;">Hover • color shifts</div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:14px;">
      <div style="font:600 13px/18px var(--font-sans);color:var(--text-primary);">dur-base</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--brand-500);margin-top:2px;">180ms</div>
      <div style="font:400 12px/16px var(--font-sans);color:var(--text-tertiary);margin-top:6px;">Layout • route • drawer</div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:14px;">
      <div style="font:600 13px/18px var(--font-sans);color:var(--text-primary);">dur-slow</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--brand-500);margin-top:2px;">280ms</div>
      <div style="font:400 12px/16px var(--font-sans);color:var(--text-tertiary);margin-top:6px;">Reserved</div>
    </div>
  
</div>
<div style="margin-top:16px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:14px;display:flex;gap:24px;align-items:center;">
  <div>
    <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">Easing</div>
    <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:4px;">ease-out: cubic-bezier(0.16, 1, 0.3, 1)</div>
    <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);">ease-in-out: cubic-bezier(0.65, 0, 0.35, 1)</div>
  </div>
  <div style="margin-left:auto;font:400 12px/16px var(--font-sans);color:var(--text-tertiary);font-style:italic;max-width:280px;">No animation on data updates in tables. Only on layout transitions.</div>
</div>

</body>
</html>
