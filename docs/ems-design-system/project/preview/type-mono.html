<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mono • JetBrains Mono</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:20px;">
  <div style="font:500 11px/14px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;">Use for codes, IDs, timestamps</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Employee code</span>
        <span style="font:500 13px/18px var(--font-mono);color:var(--text-primary);">EMP-04217</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Payslip ref</span>
        <span style="font:500 13px/18px var(--font-mono);color:var(--text-primary);">PSL-2026-05-A19</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Request ID</span>
        <span style="font:500 12px/16px var(--font-mono);color:var(--text-tertiary);">req-7c41e9b…</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Checked in</span>
        <span style="font:500 13px/18px var(--font-mono);color:var(--text-primary);">09:02:14</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Hours today</span>
        <span style="font:500 13px/18px var(--font-mono);color:var(--text-primary);">06h 47m</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font:400 13px/18px var(--font-sans);color:var(--text-secondary);">Audit log entry</span>
        <span style="font:500 12px/16px var(--font-mono);color:var(--text-tertiary);">2026-05-27T14:08:22Z</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
