<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Brand</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(222 100% 97%);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">brand-50</div>
        <div style="font:500 10px/13px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">tint • hover</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(222 95% 92%);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">brand-100</div>
        <div style="font:500 10px/13px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">avatar tint</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(222 80% 52%);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">brand-500</div>
        <div style="font:500 10px/13px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">PRIMARY</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(222 75% 46%);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">brand-600</div>
        <div style="font:500 10px/13px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">hover</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(222 70% 40%);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">brand-700</div>
        <div style="font:500 10px/13px var(--font-sans);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">press</div>
      </div>
    </div>
  
</div>

</body>
</html>
