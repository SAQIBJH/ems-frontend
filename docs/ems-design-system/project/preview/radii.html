<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <div style="width:56px;height:56px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:4px;"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">sm</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">4px</div>
        <div style="font:400 11px/14px var(--font-sans);color:var(--text-tertiary);margin-top:4px;">Badges • chips</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <div style="width:56px;height:56px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:8px;"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">md</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">8px</div>
        <div style="font:400 11px/14px var(--font-sans);color:var(--text-tertiary);margin-top:4px;">Inputs • buttons</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <div style="width:56px;height:56px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:12px;"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">lg</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">12px</div>
        <div style="font:400 11px/14px var(--font-sans);color:var(--text-tertiary);margin-top:4px;">Cards</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <div style="width:56px;height:56px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:16px;"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">xl</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">16px</div>
        <div style="font:400 11px/14px var(--font-sans);color:var(--text-tertiary);margin-top:4px;">Modals</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <div style="width:56px;height:56px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:9999px;"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">full</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">9999px</div>
        <div style="font:400 11px/14px var(--font-sans);color:var(--text-tertiary);margin-top:4px;">Avatars</div>
      </div>
    </div>
  
</div>

</body>
</html>
