<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); margin: 0; }
  * { box-sizing: border-box; }
  
.badge { display:inline-flex; align-items:center; gap:5px; height:20px; padding:0 8px; border-radius:9999px; font:500 12px/16px var(--font-sans); border:1px solid transparent; white-space:nowrap; }
.badge-default { background: var(--brand-500); color: var(--text-on-primary); }
.badge-secondary { background: var(--bg-surface-2); color: var(--text-primary); }
.badge-outline { background: var(--bg-surface); border-color: var(--border-default); color: var(--text-primary); }
.badge-success { background: hsla(152, 60%, 40%, 0.12); color: var(--success-500); }
.badge-warning { background: hsla(38, 92%, 50%, 0.14); color: hsl(38 80% 40%); }
.badge-danger { background: hsla(0, 75%, 50%, 0.12); color: var(--danger-500); }
.badge-info { background: hsla(210, 90%, 50%, 0.12); color: var(--info-500); }
.dot { width:6px; height:6px; border-radius:9999px; background:currentColor; }

</style>
</head>
<body>

<div style="display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="badge badge-default">Default</span>
    <span class="badge badge-secondary">Secondary</span>
    <span class="badge badge-outline">Outline</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="badge badge-success"><span class="dot"></span>Present</span>
    <span class="badge badge-success">Approved</span>
    <span class="badge badge-warning"><span class="dot"></span>Pending</span>
    <span class="badge badge-danger"><span class="dot"></span>Absent</span>
    <span class="badge badge-danger">Rejected</span>
    <span class="badge badge-info"><span class="dot"></span>WFH</span>
    <span class="badge badge-info">Note</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="badge badge-secondary" style="font-family:var(--font-mono);font-size:11px;">EMP-04217</span>
    <span class="badge badge-secondary">Engineering</span>
    <span class="badge badge-secondary">FULL_TIME</span>
    <span class="badge badge-outline">Senior</span>
  </div>
</div>

</body>
</html>
