<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:8px;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:100%;height:84px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:0 1px 2px hsl(220 30% 10% / 0.04);"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">xs</div>
        <div style="font:500 10px/13px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">--shadow-xs</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:100%;height:84px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:0 2px 4px hsl(220 30% 10% / 0.06);"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">sm</div>
        <div style="font:500 10px/13px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">--shadow-sm — dropdowns</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:100%;height:84px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:0 4px 12px hsl(220 30% 10% / 0.08);"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">md</div>
        <div style="font:500 10px/13px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">--shadow-md — popovers</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:100%;height:84px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:0 12px 32px hsl(220 30% 10% / 0.12);"></div>
      <div style="text-align:center;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">lg</div>
        <div style="font:500 10px/13px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">--shadow-lg — modals</div>
      </div>
    </div>
  
</div>
<div style="margin-top:16px;font:400 12px/16px var(--font-sans);color:var(--text-tertiary);font-style:italic;">Cards do not get shadows. They get borders.</div>

</body>
</html>
