<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); margin: 0; }
  * { box-sizing: border-box; }
  
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font:500 14px/20px var(--font-sans); border-radius:8px; border:1px solid transparent; padding:0 16px; height:36px; cursor:pointer; transition:background-color 120ms, border-color 120ms, color 120ms, transform 60ms; white-space:nowrap; }
.btn:active { transform: translateY(1px); }
.btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-color: var(--focus-ring); }
.btn-default { background: var(--brand-500); color: var(--text-on-primary); }
.btn-default:hover { background: var(--brand-600); }
.btn-outline { background: var(--bg-surface); border-color: var(--border-default); color: var(--text-primary); }
.btn-outline:hover { background: var(--bg-surface-2); }
.btn-secondary { background: var(--bg-surface-2); color: var(--text-primary); }
.btn-secondary:hover { background: hsl(220 14% 92%); }
.btn-ghost { background: transparent; color: var(--text-primary); }
.btn-ghost:hover { background: var(--bg-surface-2); }
.btn-destructive { background: hsla(0, 75%, 50%, 0.10); color: var(--danger-500); }
.btn-destructive:hover { background: hsla(0, 75%, 50%, 0.18); }
.btn-link { color: var(--brand-500); background: transparent; text-decoration: none; padding: 0; height: auto; }
.btn-link:hover { text-decoration: underline; }
.btn-xs { height:28px; padding:0 10px; font-size:12px; gap:6px; border-radius:6px; }
.btn-sm { height:32px; padding:0 12px; font-size:13px; gap:8px; border-radius:8px; }
.btn-lg { height:40px; padding:0 20px; }
.btn[disabled], .btn[aria-disabled="true"] { opacity:0.5; pointer-events:none; }
.btn svg { width:14px; height:14px; flex-shrink:0; }

</style>
</head>
<body>

<div style="display:flex;flex-direction:column;gap:18px;">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-default"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add Employee</button>
    <button class="btn btn-outline">Cancel</button>
    <button class="btn btn-secondary">Filters</button>
    <button class="btn btn-ghost">Sign out</button>
    <button class="btn btn-destructive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>
    <button class="btn btn-link">Learn more</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-default btn-xs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>xs</button>
    <button class="btn btn-default btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>sm</button>
    <button class="btn btn-default"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>default</button>
    <button class="btn btn-default btn-lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>lg</button>
    <button class="btn btn-outline" disabled>Disabled</button>
  </div>
</div>

</body>
</html>
