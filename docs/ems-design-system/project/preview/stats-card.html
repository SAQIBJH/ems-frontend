<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>StatsCard</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); margin: 0; }
  * { box-sizing: border-box; }
  
.stats { border:1px solid var(--border-subtle); border-radius:12px; background:var(--bg-surface); padding:16px; }
.stats-label { display:flex; align-items:center; justify-content:space-between; }
.stats-label span { font:500 13px/18px var(--font-sans); color: var(--text-secondary); }
.stats-icon { width:32px; height:32px; display:grid; place-items:center; background:var(--brand-50); color:var(--brand-500); border-radius:8px; }
.stats-icon svg { width:16px; height:16px; }
.stats-value { font:600 24px/32px var(--font-sans); letter-spacing:-0.015em; color:var(--text-primary); margin-top:10px; font-variant-numeric: tabular-nums; }
.stats-sub { font:500 12px/16px var(--font-sans); margin-top:10px; }
.stats-sub.positive { color: var(--success-500); }
.stats-sub.warning { color: var(--warning-500); }
.stats-sub.neutral { color: var(--text-tertiary); }

</style>
</head>
<body>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div class="stats">
    <div class="stats-label"><span>Total Employees</span><div class="stats-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div>
    <div class="stats-value">1,240</div>
    <div class="stats-sub positive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:inline;vertical-align:-2px;margin-right:4px;"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>+12 vs last month</div>
  </div>
  <div class="stats">
    <div class="stats-label"><span>Open Requests</span><div class="stats-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M9 16l2 2 4-4"/></svg></div></div>
    <div class="stats-value">17</div>
    <div class="stats-sub warning">3 urgent</div>
  </div>
</div>

</body>
</html>
