<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Text</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);padding:20px;display:flex;flex-direction:column;gap:14px;">
  
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:24px;height:24px;border-radius:6px;background:hsl(222 47% 11%);border:1px solid var(--border-subtle);"></div>
      <div style="font:500 14px/20px var(--font-sans);color:hsl(222 47% 11%);min-width:120px;">Page title • body copy</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-left:auto;">--text-primary</div>
    </div>
  
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:24px;height:24px;border-radius:6px;background:hsl(220 9% 38%);border:1px solid var(--border-subtle);"></div>
      <div style="font:500 14px/20px var(--font-sans);color:hsl(220 9% 38%);min-width:120px;">Labels • description</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-left:auto;">--text-secondary</div>
    </div>
  
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:24px;height:24px;border-radius:6px;background:hsl(220 9% 55%);border:1px solid var(--border-subtle);"></div>
      <div style="font:500 14px/20px var(--font-sans);color:hsl(220 9% 55%);min-width:120px;">Caption • metadata</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-left:auto;">--text-tertiary</div>
    </div>
  
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:24px;height:24px;border-radius:6px;background:hsl(220 9% 72%);border:1px solid var(--border-subtle);"></div>
      <div style="font:500 14px/20px var(--font-sans);color:hsl(220 9% 72%);min-width:120px;">Disabled controls</div>
      <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-left:auto;">--text-disabled</div>
    </div>
  
</div>

</body>
</html>
