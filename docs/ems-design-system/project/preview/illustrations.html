<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Empty-state illustrations</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); margin: 0; }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <rect x="10" y="8" width="44" height="48" rx="3" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="10" y="8" width="44" height="13" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <line x1="10" y1="21" x2="54" y2="21" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="18" y1="32" x2="46" y2="32" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round" stroke-dasharray="5 3"/>
    <line x1="18" y1="41" x2="40" y2="41" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round" stroke-dasharray="5 3"/>
    <line x1="18" y1="50" x2="44" y2="50" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round" stroke-dasharray="5 3"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoData</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <circle cx="32" cy="22" r="9" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5" fill="currentColor" fill-opacity="0.06"/>
    <path d="M14 52a14 14 0 0 1 14-12h8a14 14 0 0 1 14 12" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round" fill="currentColor" fill-opacity="0.06"/>
    <circle cx="14" cy="28" r="5" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="50" cy="28" r="5" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoTeam</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <rect x="10" y="12" width="44" height="44" rx="3" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="10" y1="24" x2="54" y2="24" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="8" x2="20" y2="16" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="44" y1="8" x2="44" y2="16" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
    <circle cx="22" cy="36" r="2" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="32" cy="36" r="2" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="42" cy="36" r="2" fill="currentColor" fill-opacity="0.2"/>
    <circle cx="22" cy="46" r="2" fill="currentColor" fill-opacity="0.15"/>
    <circle cx="32" cy="46" r="2" fill="currentColor" fill-opacity="0.15"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoHolidays</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <rect x="12" y="8" width="40" height="48" rx="3" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M22 30l6 6 14-14" stroke="currentColor" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="22" y1="46" x2="42" y2="46" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round" stroke-dasharray="3 3"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoApprovals</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <circle cx="28" cy="28" r="14" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5" fill="currentColor" fill-opacity="0.06"/>
    <line x1="40" y1="40" x2="54" y2="54" stroke="currentColor" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="22" y1="28" x2="34" y2="28" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoSearchResults</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-surface);">
      <svg viewBox="0 0 64 64" fill="none" style="width:64px;height:64px;color:var(--text-tertiary);">
    <path d="M16 6h22l10 10v40a2 2 0 0 1-2 2H16a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M38 6v10h10" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="22" y1="30" x2="42" y2="30" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round" stroke-dasharray="5 3"/>
    <line x1="22" y1="40" x2="38" y2="40" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round" stroke-dasharray="5 3"/>
  </svg>
      <div style="font:500 11px/14px var(--font-sans);color:var(--text-secondary);text-align:center;">NoDocuments</div>
    </div>
  
</div>

</body>
</html>
