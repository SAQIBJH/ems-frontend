<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: var(--bg-canvas); color: var(--text-primary); }
  * { box-sizing: border-box; }
  
</style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(220 14% 98%);border-bottom:1px solid var(--border-subtle);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">bg-canvas</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">hsl(220 14% 98%)</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(0 0% 100%);border-bottom:1px solid var(--border-subtle);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">bg-surface</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">hsl(0 0% 100%)</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(220 14% 97%);border-bottom:1px solid var(--border-subtle);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">bg-surface-raised</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">hsl(220 14% 97%)</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(220 14% 96%);border-bottom:1px solid var(--border-subtle);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">bg-surface-2</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">hsl(220 14% 96%)</div>
      </div>
    </div>
  
    <div style="border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden;background:var(--bg-surface);">
      <div style="height:64px;background:hsl(220 30% 8%);border-bottom:1px solid var(--border-subtle);"></div>
      <div style="padding:10px 12px;">
        <div style="font:600 12px/16px var(--font-sans);color:var(--text-primary);">bg-overlay</div>
        <div style="font:500 11px/14px var(--font-mono);color:var(--text-tertiary);margin-top:2px;">hsl(220 30% 8%)</div>
      </div>
    </div>
  
</div>

</body>
</html>
